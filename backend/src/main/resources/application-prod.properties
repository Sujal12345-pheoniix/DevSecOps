# Production Profile: database configuration
# Render can boot without an attached database by falling back to H2, while
# still allowing a managed MySQL database through environment variables.

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:devtrack-prod;DB_CLOSE_DELAY=-1;MODE=MySQL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}


# H2 Console is disabled in production
spring.h2.console.enabled=false
