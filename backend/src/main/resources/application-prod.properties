# Production Profile: database configuration
# Render can boot without an attached database by falling back to H2, while
# still allowing a managed MySQL database through environment variables.

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:devtrack-prod;DB_CLOSE_DELAY=-1;MODE=MySQL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}

# H2 Console is disabled in production
spring.h2.console.enabled=false
