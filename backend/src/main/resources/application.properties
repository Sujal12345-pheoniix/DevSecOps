spring.application.name=devtrack-backend

# Default Profile: In-Memory H2 Database for local zero-dependency runs
spring.datasource.url=jdbc:h2:mem:devtrack;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# H2 Console Settings
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# JWT Security Configurations
devtrack.jwt.secret=${JWT_SECRET:407f3f61556942b083321cb17036d0bc6cff4bf51a2d5ad5a7c36a6cf9df8268cfb8414fa9cf0ee86d11f6213702be9d9f5ad30424564c703b418fb5ff45db11}
devtrack.jwt.expiration-ms=86400000

# Server Port
server.port=8080

# File Upload Settings
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Swagger UI & API Docs Path
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
